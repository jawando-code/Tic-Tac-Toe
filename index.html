<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="toe.css">
</head>
<body>
    <div class="guiName">
        </div>
    <div class="symbol"></div>
    <div class="container">
        
        <h1 class="header">tic-tac-toe</h1>
        
        <div class="board" style="display: none" ></div>
        <div>
            <button type="button" id="start">start</button>
        </div>
        <div class="nameEntry">
            <label for="playerName">Enter name:</label>
            <input type="text" class="playerName" for="playerName">
            <button type="submit" id="submit" for="playerName">enter</button>
        </div>

        <div class="xoSelect">
            <button type="button" class="btn" value="x">x</button>
            <button type="button" class="btn" value="o">o</button>
            
        </div>
        </div>
    </div>
    
    

<script src='ttt.js' ></script>    
</body>
</html>
